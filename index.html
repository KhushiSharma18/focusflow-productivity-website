<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <nav>
        <h3 class="name">Focus<span>Flow</span></h3>
        
        <ul>
            <li>Home</li>
            <li>Planner</li>
            <li>Goals</li>
            <li>Tools</li>
            <li>About</li>
        </ul>

        <button type="button" class="signup">
            Get Started
        </button>

    </nav>

    <section class="intro">
        <div class="intro-text">
            
            <h2>Plan Your Day,<br>
            <span>Achieve</span> Your Goals.</h2>
            <p>Focus<span>Flow</span> helps you stay organized, manage your time<br>
            and be more productive every single day.</p>

            <button type="button" class="signup">
                Get Started
            </button>
        </div>
    </section>

    <div class="stats-container">

        <div class="stats-card">
            <div class="stats-icon user">
                <i class="fa-solid fa-users"></i>
            </div>
            <div class="stats-content">
                <h2>10K+</h2>
                <p>Active Users</p>
            </div>
        </div>

        <div class="stats-card">
            <div class="stats-icon goals">
                <i class="fa-solid fa-list-check"></i>
            </div>
            <div class="stats-content">
                <h2>500+</h2>
                <p>Daily Goals Achieved</p>
            </div>
        </div>

        <div class="stats-card">
            <div class="stats-icon productivity">
                <i class="fa-solid fa-circle-check"></i>
            </div>
            <div class="stats-content">
                <h2>98%</h2>
                <p>Productivity Increase</p>
            </div>
        </div>

        <div class="stats-card">
            <div class="stats-icon support">
                <i class="fa-regular fa-clock"></i>
            </div>
            <div class="stats-content">
                <h2>24/7</h2>
                <p>Focus & Support</p>
            </div>
        </div>

     </div>

</body>
</html>
